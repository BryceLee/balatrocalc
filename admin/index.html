<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>BalatroCalc 管理后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        background: #0f1513;
        color: #f5f5f5;
        margin: 0;
        padding: 2rem;
      }
      h1 {
        margin-bottom: 1rem;
      }
      section {
        border: 1px solid #2a3a34;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        background: rgba(0, 0, 0, 0.3);
      }
      h2, h3 {
        margin-top: 0;
      }
      label {
        display: block;
        margin: 0.5rem 0 0.25rem;
        font-size: 0.9rem;
      }
      input, select, button {
        width: 100%;
        padding: 0.5rem;
        border-radius: 6px;
        border: 1px solid #3a4b44;
        background: #0b120f;
        color: #f5f5f5;
        font-size: 0.9rem;
      }
      button {
        margin-top: 0.75rem;
        cursor: pointer;
        background: #183126;
      }
      button:hover {
        background: #1f3a2d;
      }
      pre {
        background: #0b120f;
        padding: 0.75rem;
        border-radius: 6px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0.75rem;
        font-size: 0.9rem;
      }
      th, td {
        border-bottom: 1px solid #26362f;
        padding: 0.55rem;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: #a8c9b6;
        font-weight: 700;
      }
      .status {
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      .admin-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.75rem;
      }
      .metric-card {
        border: 1px solid #30483c;
        background: #0b120f;
        padding: 0.85rem;
        border-radius: 8px;
      }
      .metric-card span {
        display: block;
        color: #a8c9b6;
        font-size: 0.8rem;
      }
      .metric-card strong {
        display: block;
        margin-top: 0.3rem;
        font-size: 1.4rem;
      }
      .toolbar {
        display: grid;
        grid-template-columns: minmax(120px, 180px) 1fr minmax(120px, 180px);
        gap: 0.75rem;
        align-items: end;
      }
      .muted {
        color: #9fb4a9;
        font-size: 0.85rem;
      }
      .scroll-table {
        overflow-x: auto;
      }
      @media (max-width: 720px) {
        body {
          padding: 1rem;
        }
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-5I-hPovMBFFFKFKnPjJ_4.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init();
  </script>
</head>
  <body>
    <h1>BalatroCalc 管理后台</h1>

    <section>
      <h2>行为分析报表</h2>
      <div class="toolbar">
        <div>
          <label for="analyticsDays">时间范围</label>
          <select id="analyticsDays">
            <option value="7">最近 7 天</option>
            <option value="30" selected>最近 30 天</option>
            <option value="90">最近 90 天</option>
          </select>
        </div>
        <div>
          <label for="analyticsEmail">用户行为时间线邮箱</label>
          <input id="analyticsEmail" type="email" placeholder="user@example.com">
        </div>
        <button id="analyticsRefresh" type="button">刷新报表</button>
      </div>
      <p id="analyticsStatus" class="status muted">正在加载行为数据...</p>

      <h3>总览</h3>
      <div id="analyticsOverview" class="admin-grid"></div>

      <h3>订阅转化漏斗</h3>
      <div class="scroll-table">
        <table>
          <thead>
            <tr>
              <th>事件</th>
              <th>独立用户</th>
              <th>事件次数</th>
            </tr>
          </thead>
          <tbody id="analyticsFunnel"></tbody>
        </table>
      </div>

      <h3>流失点</h3>
      <div class="scroll-table">
        <table>
          <thead>
            <tr>
              <th>事件</th>
              <th>独立用户</th>
              <th>事件次数</th>
            </tr>
          </thead>
          <tbody id="analyticsDropoffs"></tbody>
        </table>
      </div>

      <h3>付费用户使用情况</h3>
      <div class="scroll-table">
        <table>
          <thead>
            <tr>
              <th>邮箱</th>
              <th>最近活跃</th>
              <th>事件次数</th>
              <th>付费分析次数</th>
              <th>复制种子次数</th>
            </tr>
          </thead>
          <tbody id="analyticsPaidUsage"></tbody>
        </table>
      </div>

      <h3>用户行为时间线</h3>
      <div class="scroll-table">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>事件</th>
              <th>状态</th>
              <th>页面</th>
              <th>属性</th>
            </tr>
          </thead>
          <tbody id="analyticsTimeline"></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>查询会员</h2>
      <label for="searchEmail">邮箱或付款邮箱</label>
      <input id="searchEmail" type="email" placeholder="user@example.com">
      <button id="searchBtn" type="button">查询</button>
      <pre id="searchResult">[]</pre>
    </section>

    <section>
      <h2>手动添加会员（USDT）</h2>
      <label for="paymentEmail">邮箱</label>
      <input id="paymentEmail" type="email" placeholder="user@example.com">
      <label for="paymentPlan">套餐</label>
      <select id="paymentPlan">
        <option value="seed-monthly">Seed 月付</option>
        <option value="seed-yearly">Seed 年付</option>
        <option value="seed-lifetime">Seed 终身</option>
      </select>
      <label for="paymentAmount">金额（USD）</label>
      <input id="paymentAmount" type="number" step="0.01" value="5">
      <label for="paymentTxn">交易号</label>
      <input id="paymentTxn" type="text" placeholder="tx_123">
      <button id="paymentBtn" type="button">添加付款</button>
      <div id="paymentStatus" class="status"></div>
    </section>

    <section>
      <h2>撤销权限</h2>
      <label for="revokeEmail">邮箱</label>
      <input id="revokeEmail" type="email" placeholder="user@example.com">
      <button id="revokeBtn" type="button">撤销全部有效会员</button>
      <div id="revokeStatus" class="status"></div>
    </section>

    <script src="admin.js"></script>
  </body>
</html>
